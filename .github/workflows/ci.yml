name: CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        
    - name: Compilar y Ejecutar Pruebas Unitarias
      run: mvn -B test
      
    - name: Ejecutar Pruebas de Integración, Sistema y Validar Cobertura
      run: mvn -B verify

  perf_tests:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          
      - name: Iniciar la aplicación
        run: mvn -DskipTests spring-boot:run &
        
      - name: Esperar a que inicie la app
        run: sleep 20
        
      - name: Instalar k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Crear directorio de resultados
        run: mkdir -p perf/results

      - name: Ejecutar Baseline test
        env:
          BASE_URL: http://localhost:8080
          SCENARIO: baseline
        run: k6 run perf/scripts/register_product_k6.js --out json=perf/results/baseline.json
        
      - name: Ejecutar Load test
        env:
          BASE_URL: http://localhost:8080
          SCENARIO: load
        run: k6 run perf/scripts/register_product_k6.js --out json=perf/results/load.json
        
      - name: Archivar resultados
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: perf-results
          path: perf/results/
