name: CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        
    - name: Compilar y Ejecutar Pruebas Unitarias
      run: mvn -B test
      
    - name: Ejecutar Pruebas de Integración, Sistema y Validar Cobertura
      run: mvn -B verify
